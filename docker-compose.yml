# Local development helper: a Postgres for `npm run dev` to talk to.
# Register http://127.0.0.1:3000/api/auth/callback as a redirect URI on your
# Spotify app, copy .env.example to .env.local, then `npm run dev`.
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: spotify_widget
      POSTGRES_USER: spotify_user
      POSTGRES_PASSWORD: dev
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - spotify_widget_pg:/var/lib/postgresql/data

volumes:
  spotify_widget_pg:
